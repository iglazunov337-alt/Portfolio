<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфоліо | Ілля ГЛАЗУНОВ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet/less" type="text/css" href="css/style.less">
    <script src="https://cdn.jsdelivr.net/npm/less"></script>
    
    <style>
        /* --- ОНОВЛЕНА ВЕРХУШКА ДЛЯ ОДНОСТАЙНОСТІ --- */
        .navbar { 
            background-color: #2E75B6 !important; 
            min-height: 100px; 
            display: flex;
            align-items: center;
            padding: 0 !important;
            border: none !important;
        }

        .navbar-brand { 
            color: #ffcc00 !important; 
            font-size: 2.8rem !important; 
            margin: 0 !important;
            display: flex;
            align-items: center;
            letter-spacing: -1px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .custom-btn-style {
            color: white !important;
            font-weight: bold;
            padding: 10px 22px !important;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50px;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .custom-btn-style:hover, .custom-btn-style.active {
            background-color: #ffcc00 !important;
            color: #333 !important;
            border-color: #ffcc00 !important;
        }

        @media (min-width: 992px) {
            .navbar .container { display: flex !important; justify-content: space-between !important; align-items: center !important; }
            .navbar-collapse { display: flex !important; justify-content: flex-end !important; }
        }
        @media (max-width: 991px) {
            .navbar { padding: 15px 0 !important; }
            .navbar .container { flex-direction: column !important; align-items: center !important; }
            .navbar-brand { font-size: 2.2rem !important; margin-bottom: 10px !important; }
        }

        /* --- ТВОЇ ОРИГІНАЛЬНІ СТИЛІ ПОРТФОЛІО --- */
        body { 
            background-color: #2b5d8c; 
            color: white; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column;
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        .section-title { 
            color: #ffcc00 !important; 
            font-weight: 900; 
            text-transform: uppercase; 
            font-size: 3rem;
            margin-top: 2rem;
        }

        .project-card {
            transition: transform 0.3s ease;
            border: none;
            border-radius: 20px;
            background: white;
            color: #333;
            overflow: hidden;
            height: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .project-card:hover { transform: translateY(-10px); }

        .card-img-wrapper { 
            position: relative; 
            aspect-ratio: 4 / 3; 
            background-color: #eee; /* Заглушка, поки вантажаться фото */
        }

        .overlay {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(46, 117, 182, 0.95);
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            opacity: 0; 
            visibility: hidden; 
            transition: 0.3s;
            z-index: 10; 
            padding: 20px; 
            text-align: center; 
            color: white;
        }

        .project-card:hover .overlay { 
            opacity: 1; 
            visibility: visible; 
        }

        .card-body { padding: 1.5rem; }
        .card-title { color: #2E75B6; font-weight: bold; font-size: 1.4rem; }

        /* Стилі для ЛР №5 */
        .loader-wrapper { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999999; transition: opacity 0.5s; }
        .loader { width: 60px; height: 60px; border: 6px solid #f3f3f3; border-top: 6px solid #2E75B6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Стилі для Lightbox (ЛР №6) */
        
/* --- СТИЛІ ДЛЯ LIGHTBOX (ЯК У ПРИКЛАДІ) --- */
.lightbox-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.85); 
    display: flex; justify-content: center; align-items: center; 
    z-index: 2000; padding: 20px;
}

.lightbox-content {
    background: white;
    width: 100%;
    max-width: 650px; /* Обмежуємо ширину вікна */
    border-radius: 15px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.lightbox-content img {
    width: 100%;
    height: 350px; /* Фіксована висота для картинки */
    object-fit: cover; /* Картинка заповнює область без спотворень */
    display: block;
}

.lightbox-info {
    padding: 25px;
    color: #333;
    text-align: left;
}

.lightbox-info h4 {
    font-weight: bold;
    font-size: 1.6rem;
    margin-bottom: 10px;
}

.lightbox-info p {
    font-size: 0.95rem;
    color: #666;
    margin-bottom: 15px;
}

.lightbox-close {
    position: absolute; top: 15px; right: 20px;
    font-size: 30px; color: white; cursor: pointer;
    z-index: 2100; text-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.lightbox-nav {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px;
}


/* --- СТИЛЬ КНОПОК ФІЛЬТРАЦІЇ --- */
        .filter-btn {
            background: transparent;
            color: #ffcc00; /* Жовтий, як у твого бренду */
            border: 2px solid #ffcc00;
            padding: 8px 25px;
            margin: 5px;
            border-radius: 50px; /* Круглі, як у меню */
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .filter-btn:hover {
            background: rgba(255, 204, 0, 0.2);
            color: #fff;
            border-color: #fff;
        }

        .filter-btn.active {
            background-color: #ffcc00 !important;
            color: #333 !important;
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.4);
        }








        /* --- СТИЛИ ДЛЯ КНОПКИ ПЕРЕКЛЮЧЕНИЯ ТЕМЫ --- */

/* 1. Кнопка по умолчанию (когда тема СВЕТЛАЯ) */
#themeToggle {
    background-color: #f1f3f5 !important;       /* Светлый фон */
    color: #1a2229 !important;                  /* Черный текст */
    border: 1px solid rgba(0, 0, 0, 0.1) !important;
    border-radius: 6px !important;
    padding: 6px 14px !important;
    font-weight: 500 !important;
    font-size: 0.9rem !important;
    display: inline-flex !important;
    align-items: center !important;
    gap: 8px !important;
    transition: all 0.2s !important;
}

#themeToggle:hover {
    background-color: #e2e6ea !important;       /* Чуть темнее при наведении в светлой теме */
}

/* Автоматическая подстановка иконки солнышка для светлой темы */
#themeToggle::before {
    content: "☀️" !important;
}


/* 2. Кнопка, когда активирована ТЕМНАЯ ТЕМА (внутри body.dark-theme) */
body.dark-theme #themeToggle {
    background-color: #1a2229 !important;       /* Темный фон */
    color: white !important;                    /* Белый текст */
    border: 1px solid rgba(255, 255, 255, 0.15) !important;
}

body.dark-theme #themeToggle:hover {
    background-color: #25313c !important;       /* Светлее при наведении в темной теме */
}

/* Автоматическая подмена иконки на луну в темной теме */
body.dark-theme #themeToggle::before {
    content: "🌑" !important;
}










    </style>
</head>
